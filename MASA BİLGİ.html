<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Masa Seçimi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: linear-gradient(135deg,#0f0f0f,#1c1c1c); color:white; }

.masa-card {
  background:#1e1e1e; border-radius:14px; padding:25px; margin:10px;
  cursor:pointer; transition:.3s; text-align:center;
}
.masa-card:hover { transform:scale(1.05); box-shadow:0 0 15px #ffc107; }

.masa-bos { border-left:6px solid #28a745; }
.masa-dolu { border-left:6px solid #dc3545; }

.masa-secili { border:2px solid #ffc107 !important; box-shadow:0 0 20px #ffc107; }

.tutar { font-size:18px; font-weight:bold; color:#ffc107; }

.siparis-panel {
  position:fixed; top:20px; right:-320px; width:300px; height:90%;
  background:#1a1a1a; border-left:3px solid #ffc107;
  padding:15px; transition:.3s; overflow-y:auto;
}
.siparis-panel.aktif { right:0; }

.btn-hero {
  background:linear-gradient(90deg,#ffc107,#ff9800);
  color:black; font-weight:bold; padding:12px 25px;
  border-radius:12px; border:none;
}
</style>
</head>

<body class="p-4">

<div class="container text-center">
  <h2 class="mb-4">Masa Seçiniz</h2>
  <div class="row" id="masaAlani"></div>
  <button id="secBtn" class="btn btn-hero mt-4" disabled>Seçilen Masayı Onayla</button>
</div>

<div class="siparis-panel" id="siparisPanel">
  <h5 id="panelBaslik">Siparişler</h5>
  <div id="siparisIcerik"></div>
</div>

<script>
let secilenMasa=null;
const masaAlani=document.getElementById("masaAlani");
const panel=document.getElementById("siparisPanel");
const panelIcerik=document.getElementById("siparisIcerik");
const panelBaslik=document.getElementById("panelBaslik");

for(let i=1;i<=12;i++){

  let masaTutar=localStorage.getItem("masa_"+i+"_tutar");
  let siparisler=JSON.parse(localStorage.getItem("masa_"+i+"_siparisler"))||[];
  let durum=masaTutar?"dolu":"bos";

  let col=document.createElement("div");
  col.className="col-md-3";

  col.innerHTML=`
    <div class="masa-card ${durum==="bos"?"masa-bos":"masa-dolu"}">
      <h4>Masa ${i}</h4>
      <p>${durum==="bos"?"Boş":"Dolu"}</p>
      ${durum==="dolu"?`<div class="tutar">${masaTutar} ₺</div>`:""}
    </div>
  `;

  masaAlani.appendChild(col);
  const card=col.querySelector(".masa-card");

  card.addEventListener("click",()=>{
    document.querySelectorAll(".masa-card").forEach(m=>m.classList.remove("masa-secili"));
    card.classList.add("masa-secili");
    secilenMasa=i;
    document.getElementById("secBtn").disabled=false;
  });

  card.addEventListener("mouseenter",()=>{
    if(durum==="dolu"){
      panel.classList.add("aktif");
      panelBaslik.innerText="Masa "+i+" Siparişleri";

      if(siparisler.length===0){
        panelIcerik.innerHTML="<p>Sipariş yok</p>";
      }else{
        panelIcerik.innerHTML="";
        siparisler.forEach(s=>{
          panelIcerik.innerHTML+=`<div>${s.ad} - ${s.fiyat} ₺</div>`;
        });
      }
    }
  });
  

  card.addEventListener("mouseleave",()=>panel.classList.remove("aktif"));
}

document.getElementById("secBtn").addEventListener("click",()=>{
  if(secilenMasa){

    let mevcutTutar=localStorage.getItem("masa_"+secilenMasa+"_tutar");

    if(!mevcutTutar){
      localStorage.setItem("masa_"+secilenMasa+"_tutar",0);
      localStorage.setItem("masa_"+secilenMasa+"_siparisler",JSON.stringify([]));
    }

    localStorage.setItem("aktifMasa",secilenMasa);
    window.location.href="menu.html";
  }
});
</script>

</body>
</html>
