<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Urban POS - Gün Sonu Raporu & Analiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0f0f0f; color:white; padding: 40px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .report-card { background:#1a1a1a; border-radius:15px; padding:30px; border: 1px solid #ffc107; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .analiz-card { background:#222; border-radius:12px; padding:20px; border-left: 5px solid #ffc107; transition: 0.3s; height: 100%; }
        .analiz-card:hover { transform: translateY(-5px); background: #282828; }
        .table-dark { --bs-table-bg: #222; }
        .total-box { font-size: 1.8rem; color: #28a745; font-weight: bold; }
        .tur-metin { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .text-nakit { color: #28a745; }
        .text-kart { color: #0d6efd; }
        .form-control-dark { background: #333; border: 1px solid #444; color: white; }
        .form-control-dark:focus { background: #444; border-color: #ffc107; color: white; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="report-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-warning mb-0">📊 Gün Sonu Raporu</h2>
            <div class="d-flex gap-2">
                <input type="date" id="tarihSecici" class="form-control form-control-dark">
                <button class="btn btn-warning" onclick="tariheGoreFiltrele()">Sorgula</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>İşlem Saati</th>
                        <th>Masa Bilgisi</th>
                        <th>Ödeme Türü</th> 
                        <th>Tahsil Edilen Tutar</th>
                    </tr>
                </thead>
                <tbody id="raporTablosu"></tbody>
            </table>
        </div>
        
        <div class="mt-4 p-3 border-top border-secondary d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Seçili Gün Toplam Cirosu:</h4>
            <div id="toplamCiro" class="total-box">0 ₺</div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6 mb-3">
            <div class="analiz-card">
                <h6 class="text-secondary text-uppercase">🔥 En Çok Satılan Ürün</h6>
                <div class="d-flex align-items-center mt-3">
                    <span class="fs-1 me-3">🏆</span>
                    <div>
                        <h3 id="enCokSatanUrun" class="mb-0 text-white">Veri Yok</h3>
                        <small id="enCokSatanAdet" class="text-warning">0 adet satıldı</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="analiz-card">
                <h6 class="text-secondary text-uppercase">💳 Ödeme Yöntemi Dağılımı</h6>
                <div class="mt-3">
                    <div class="progress" style="height: 12px; background: #444; border-radius: 10px;">
                        <div id="nakitBar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                        <div id="kartBar" class="progress-bar bg-primary" role="progressbar" style="width: 0%"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-3 small">
                        <span>🟢 Nakit: <b id="nakitYuzde">%0</b> (<span id="nakitTutar">0</span> ₺)</span>
                        <span>🔵 Kart: <b id="kartYuzde">%0</b> (<span id="kartTutar">0</span> ₺)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5 mb-5 d-flex justify-content-between">
        <button class="btn btn-secondary px-4" onclick="window.location.href='siparis.html'">⬅ Sipariş Ekranına Dön</button>
        <button class="btn btn-outline-danger px-4" onclick="temizle()">Tüm Verileri Sıfırla</button>
    </div>
</div>

<script>
    
    if(sessionStorage.getItem("oturum") !== "true"){
        window.location.href = "GİRİŞ YAP.html";
    }

    window.onload = () => {
        
        let bugun = new Date().toISOString().split('T')[0];
        document.getElementById("tarihSecici").value = bugun;
        raporuYukle(bugun);
    };

    function tariheGoreFiltrele() {
        let secilenTarih = document.getElementById("tarihSecici").value;
        raporuYukle(secilenTarih);
    }

    function raporuYukle(filtreTarih) {
        let rapor = JSON.parse(localStorage.getItem("gun_sonu_raporu")) || [];
        let tablo = document.getElementById("raporTablosu");
        let tCiroGosterge = document.getElementById("toplamCiro");
        
        let toplamCiro = 0;
        let nakitToplam = 0;
        let kartToplam = 0;
        let urunSayaci = {}; 
        
        tablo.innerHTML = "";

        
        let gosterilecekVeri = rapor.filter(islem => islem.tarih === filtreTarih);

        if(gosterilecekVeri.length === 0) {
            tablo.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Bu tarihte yapılmış bir işlem bulunamadı.</td></tr>`;
        }

        gosterilecekVeri.reverse().forEach(islem => {
            toplamCiro += Number(islem.tutar);
            if(islem.tur === 'NAKİT') nakitToplam += Number(islem.tutar);
            else kartToplam += Number(islem.tutar);

            // Ürün analizi için ürünleri say
            if(islem.urunler && Array.isArray(islem.urunler)) {
                islem.urunler.forEach(u => {
                    urunSayaci[u] = (urunSayaci[u] || 0) + 1;
                });
            }
            
            let turRengi = islem.tur === 'NAKİT' ? 'text-nakit' : 'text-kart';
            tablo.innerHTML += `
                <tr>
                    <td>${islem.saat}</td>
                    <td>Masa ${islem.masa}</td>
                    <td class="tur-metin ${turRengi}">${islem.tur || "-"}</td>
                    <td class="text-warning fw-bold">${islem.tutar} ₺</td>
                </tr>`;
        });

        tCiroGosterge.innerText = toplamCiro + " ₺";
        istatistikGuncelle(nakitToplam, kartToplam, urunSayaci, toplamCiro);
    }

    function istatistikGuncelle(nakit, kart, urunler, toplam) {
        const nBar = document.getElementById("nakitBar");
        const kBar = document.getElementById("kartBar");
        
        if(toplam > 0) {
            let nYuzde = (nakit / toplam) * 100;
            let kYuzde = (kart / toplam) * 100;
            
            nBar.style.width = nYuzde + "%";
            kBar.style.width = kYuzde + "%";
            document.getElementById("nakitYuzde").innerText = "%" + Math.round(nYuzde);
            document.getElementById("kartYuzde").innerText = "%" + Math.round(kYuzde);
            document.getElementById("nakitTutar").innerText = nakit;
            document.getElementById("kartTutar").innerText = kart;
        } else {
            nBar.style.width = "0%";
            kBar.style.width = "0%";
            document.getElementById("nakitYuzde").innerText = "%0";
            document.getElementById("kartYuzde").innerText = "%0";
        }
        
        // En çok satan ürünü bul
        let urunDizisi = Object.entries(urunler);
        if(urunDizisi.length > 0) {
            let enCokSatan = urunDizisi.sort((a,b) => b[1] - a[1])[0];
            document.getElementById("enCokSatanUrun").innerText = enCokSatan[0];
            document.getElementById("enCokSatanAdet").innerText = enCokSatan[1] + " adet satıldı";
        } else {
            document.getElementById("enCokSatanUrun").innerText = "Veri Yok";
            document.getElementById("enCokSatanAdet").innerText = "Henüz ürün satışı yok";
        }
    }

    function temizle() {
        if(confirm("DİKKAT! Tüm geçmiş raporlar kalıcı olarak silinecek. Bu işlem geri alınamaz!")) {
            localStorage.removeItem("gun_sonu_raporu");
            location.reload();
        }
    }
</script>
</body>
</html>
