<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Urban POS - Gün Sonu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
}

.container-box{
max-width:500px;
margin:50px auto;
background:#1b1b1b;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px rgba(255,193,7,0.2);
}

.logo{
text-align:center;
color:#ffc107;
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.form-control, .form-select{
background:#2a2a2a;
border:none;
color:white;
}

.form-control:focus, .form-select:focus{
background:#2a2a2a;
color:white;
box-shadow:0 0 5px #ffc107;
}

.btn-yellow{
background:#ffc107;
border:none;
color:black;
font-weight:bold;
}

.btn-yellow:hover{
background:#e0a800;
}

.result-box{
background:#111;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.result-box p{
margin:5px 0;
font-size:16px;
}

.total{
color:#ffc107;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container-box">

<div class="logo">Urban POS</div>

<!-- SATIŞ EKLE -->
<div class="mb-3">
<label>Tutar (TL)</label>
<input type="number" id="tutar" class="form-control" placeholder="Örn: 150">
</div>

<div class="mb-3">
<label>Ödeme Türü</label>
<select id="odeme" class="form-select">
<option value="nakit">Nakit</option>
<option value="kart">Kart</option>
</select>
</div>

<button class="btn btn-yellow w-100" onclick="satisEkle()">Satış Ekle</button>

<hr>

<!-- GÜN SONU -->
<button class="btn btn-warning w-100" onclick="gunSonu()">Gün Sonu Al</button>

<div class="result-box" id="rapor" style="display:none;">
<p class="total">Toplam: <span id="toplam"></span> TL</p>
<p>Nakit: <span id="nakit"></span> TL</p>
<p>Kart: <span id="kart"></span> TL</p>
<p>İşlem Sayısı: <span id="adet"></span></p>

<button class="btn btn-danger w-100 mt-2" onclick="sifirla()">Yeni Gün Başlat</button>
</div>

</div>

<script>

// SATIŞ EKLE
function satisEkle(){

let tutar = Number(document.getElementById("tutar").value)
let odeme = document.getElementById("odeme").value

if(!tutar){
    alert("Tutar gir!")
    return
}

let satislar = JSON.parse(localStorage.getItem("satislar")) || []

satislar.push({
    tutar: tutar,
    tip: odeme
})

localStorage.setItem("satislar", JSON.stringify(satislar))

document.getElementById("tutar").value = ""

alert("Satış eklendi ✔")

}

// GÜN SONU
function gunSonu(){

let satislar = JSON.parse(localStorage.getItem("satislar")) || []

let toplam = 0
let nakit = 0
let kart = 0

satislar.forEach(s => {
    toplam += s.tutar

    if(s.tip === "nakit"){
        nakit += s.tutar
    }else{
        kart += s.tutar
    }
})

// ekrana yaz
document.getElementById("rapor").style.display = "block"
document.getElementById("toplam").innerText = toplam
document.getElementById("nakit").innerText = nakit
document.getElementById("kart").innerText = kart
document.getElementById("adet").innerText = satislar.length

}

// SIFIRLA
function sifirla(){
localStorage.removeItem("satislar")
location.reload()
}

</script>

</body>
</html>
