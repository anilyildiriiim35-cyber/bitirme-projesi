<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Urban POS - Gün Sonu Raporu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0f0f0f; color:white; padding: 40px; }
        .report-card { background:#1a1a1a; border-radius:15px; padding:30px; border: 1px solid #ffc107; }
        .table-dark { --bs-table-bg: #222; }
        .total-box { font-size: 2rem; color: #28a745; font-weight: bold; }
        /* Ödeme türü için eklenen minimal stil */
        .tur-metin { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .text-nakit { color: #28a745; }
        .text-kart { color: #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <div class="report-card">
        <h2 class="text-warning mb-4">Gün Sonu Raporu</h2>
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>İşlem Saati</th>
                    <th>Masa Bilgisi</th>
                    <th>Ödeme Türü</th> <th>Tahsil Edilen Tutar</th>
                </tr>
            </thead>
            <tbody id="raporTablosu"></tbody>
        </table>
        
        <div class="mt-4 p-3 border-top border-secondary d-flex justify-content-between align-items-center">
            <h4>Toplam Günlük Ciro:</h4>
            <div id="toplamCiro" class="total-box">0 ₺</div>
        </div>

        <div class="mt-5">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">Geri Dön</button>
            <button class="btn btn-danger float-end" onclick="temizle()">Yeni Güne Başla (Sıfırla)</button>
        </div>
    </div>
</div>

<script>
    function raporuYukle() {
        let rapor = JSON.parse(localStorage.getItem("gun_sonu_raporu")) || [];
        let tablo = document.getElementById("raporTablosu");
        let toplamCiro = 0;
        tablo.innerHTML = "";

        
        [...rapor].reverse().forEach(islem => {
            toplamCiro += islem.tutar;
            
            
            let turRengi = islem.tur === 'NAKİT' ? 'text-nakit' : 'text-kart';
            let turYazisi = islem.tur ? islem.tur : "-";

            tablo.innerHTML += `
                <tr>
                    <td>${islem.saat}</td>
                    <td>Masa ${islem.masa}</td>
                    <td class="tur-metin ${turRengi}">${turYazisi}</td>
                    <td class="text-warning font-weight-bold">${islem.tutar} ₺</td>
                </tr>`;
        });

        document.getElementById("toplamCiro").innerText = toplamCiro + " ₺";
    }

    function temizle() {
        if(confirm("Tüm günlük veriler silinecek. Emin misiniz?")) {
            localStorage.removeItem("gun_sonu_raporu");
            location.reload();
        }
    }

    window.onload = raporuYukle;
</script>
</body>
</html>
