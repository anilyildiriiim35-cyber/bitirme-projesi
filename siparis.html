<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sipariş Ekranı</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#121212; color:white; }
h3 { margin-bottom:20px; }

.card {
  background:#1e1e1e; border-radius:12px; transition:.2s; cursor:pointer;
}
.card:hover { transform:scale(1.05); box-shadow:0 0 10px #ffc107; }

.btn-ekle { background:#ffc107; color:black; font-weight:bold; }

.siparis-alani {
  position:fixed; right:0; top:0; width:300px; height:100%;
  background:#1a1a1a; border-left:3px solid #ffc107;
  padding:15px; overflow-y:auto;
}

.btn-odeme { background:#28a745; color:white; font-weight:bold; width:100%; margin-top:10px; }
</style>
</head>

<body class="p-4">

<div class="container">
  <h3 id="masaBaslik" class="text-warning">Masa Seçiniz</h3>

  <div class="row mb-4" id="masaAlani"></div>

  <div id="menuAlani" class="row"></div>
</div>

<div class="siparis-alani">
  <h5>Siparişler</h5>
  <div id="siparisListesi"></div>
  <hr>
  <h5>Toplam: <span id="toplamTutar">0</span> ₺</h5>
  <button class="btn btn-odeme" onclick="odemeAl()">Ödeme Al</button>
</div>

<script>
let aktifMasa = null;


const masaAlani = document.getElementById("masaAlani");
for(let i=1;i<=12;i++){
  let card = document.createElement("div");
  card.className = "col-md-2 mb-3";
  card.innerHTML = `<div class="card p-3 text-center">Masa ${i}</div>`;
  masaAlani.appendChild(card);

  card.querySelector(".card").addEventListener("click", ()=>{
    aktifMasa = i;
    document.getElementById("masaBaslik").innerText = "Masa " + i + " Sipariş Ekranı";

    
    siparisleriGoster();
  });
}


const menu = [
  {ad:"DANA PİRZOLA", fiyat:1700},
  {ad:"KUZU ANTİRİKOT", fiyat:1500},
  {ad:"KABURGA", fiyat:1200},
  {ad:"KUZU PİRZOLA", fiyat:1400},
  {ad:"BONFİLE", fiyat:1200},
  {ad:"DİNLENDİRİLMİŞ DANA ANTİRİKOT", fiyat:1800},
  {ad:"DİNLENDİRİLMİŞ KUZU ANTİRİKOT", fiyat:1600},
  {ad:"DİNLENDİRİLMİŞ KUZU PİRZOLA", fiyat:1500},
  {ad:"DİNLENDİRİLMİŞ BONFİLE", fiyat:1300},
  {ad:"DİNLENDİRİLMİŞ KABURGA", fiyat:1300},
  {ad:"DİNLENDİRİLMİŞ DANA PİRZOLA", fiyat:1900},
  {ad:"ADANA", fiyat:700},
  {ad:"URFA", fiyat:700},
  {ad:"KÖRPE", fiyat:800},
  {ad:"KUZU ŞİŞ", fiyat:900},
  {ad:"DANA ŞİŞ", fiyat:1000},
  {ad:"KUZU KÜLBASTI", fiyat:1100},
  {ad:"DANA KÜLBASTI", fiyat:1200},
  {ad:"KUZU İNCİK", fiyat:1300},
  {ad:"DANA İNCİK", fiyat:1400},
  {ad:"KUZU GÜVEÇ", fiyat:1500},
  {ad:"DANA GÜVEÇ", fiyat:1600},
  {ad:"KUZU SOTE", fiyat:1700},
  {ad:"DANA SOTE", fiyat:1600},
  {ad:"KUZU KAVURMA", fiyat:1800},
  {ad:"DANA KAVURMA", fiyat:1900},
  {ad:"MEVSİM SALATA", fiyat:500},
  {ad:"ÇOBAN SALATA", fiyat:600},
  {ad:"SEBZE SALATA", fiyat:400},
  {ad:"YEŞİL SALATA", fiyat:450},
  {ad:"ATOM", fiyat:550},
  {ad:"HAVUÇ MEZESİ", fiyat:650},
  {ad:"FAVA", fiyat:700},
  {ad:"HUMUS", fiyat:750},
  {ad:"ACILI EZME", fiyat:800},
  


];

const menuAlani = document.getElementById("menuAlani");

menu.forEach(u=>{
  menuAlani.innerHTML += `
  <div class="col-md-3 mb-3">
    <div class="card p-3 text-center">
      <h5>${u.ad}</h5>
      <p>${u.fiyat} ₺</p>
      <button class="btn btn-ekle btn-sm" onclick="urunEkle('${u.ad}', ${u.fiyat})">
        Siparişe Ekle
      </button>
    </div>
  </div>
  `;
});


function siparisleriGoster(){
  if(!aktifMasa) return;

  let siparisler = JSON.parse(localStorage.getItem("masa_" + aktifMasa + "_siparisler")) || [];
  let tutar = localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0;

  let liste = document.getElementById("siparisListesi");
  liste.innerHTML = "";

  siparisler.forEach(s=>{
    liste.innerHTML += `<div>${s.ad} - ${s.fiyat} ₺</div>`;
  });

  document.getElementById("toplamTutar").innerText = tutar;
}


function urunEkle(ad, fiyat){
  if(!aktifMasa) { alert("Önce masa seçin!"); return; }

  let siparisler = JSON.parse(localStorage.getItem("masa_" + aktifMasa + "_siparisler")) || [];
  siparisler.push({ad:ad, fiyat:fiyat});
  localStorage.setItem("masa_" + aktifMasa + "_siparisler", JSON.stringify(siparisler));

  let tutar = parseFloat(localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0);
  tutar += fiyat;
  localStorage.setItem("masa_" + aktifMasa + "_tutar", tutar);

  siparisleriGoster();
}


function odemeAl(){
  if(!aktifMasa) { alert("Önce masa seçin!"); return; }

  let tutar = localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0;
  alert("Ödeme alındı: " + tutar + " ₺");

  localStorage.removeItem("masa_" + aktifMasa + "_tutar");
  localStorage.removeItem("masa_" + aktifMasa + "_siparisler");

  aktifMasa = null;
  document.getElementById("masaBaslik").innerText = "Masa Seçiniz";
  document.getElementById("siparisListesi").innerHTML = "";
  document.getElementById("toplamTutar").innerText = "0";
}
</script>

</body>
</html>
