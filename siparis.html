<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Urban POS - Sipariş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0f0f0f; color:#e0e0e0; font-family: 'Segoe UI', sans-serif; }
        
        
        .card { background:#252525; border: 1px solid #333; border-radius:12px; cursor:pointer; color: white; transition: .2s; }
        .card:hover { border-color: #ffc107; transform: scale(1.02); }
        
        .masa-no { color: #ffc107; font-weight: bold; font-size: 1.2rem; }
        .yemek-adi { color: #ffffff; font-weight: 800; text-transform: uppercase; }
        .fiyat-text { color: #ffc107; font-weight: bold; }
        
        
        .btn-ekle { background:#ffc107; color:black; font-weight:bold; border: none; width: 100%; }
        .btn-ekle:hover { background: #e0a800; }
        
        .siparis-alani { position:fixed; right:0; top:0; width:320px; height:100%; background:#161616; border-left:4px solid #ffc107; padding:20px; overflow-y:auto; }
        
        .btn-odeme { background:#28a745; color:white; font-weight:bold; width:100%; padding: 15px; border: none; border-radius: 8px; margin-top: 20px; }
        
        .btn-rapor { 
            background: transparent; 
            color: #dc3545; 
            width: 100%; 
            margin-top: 15px; 
            border: 2px solid #dc3545; 
            border-radius: 8px; 
            padding: 10px; 
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-rapor:hover { background: #dc3545; color: white; }

        
        .modal-content { background: #1b1b1b; border: 1px solid #ffc107; color: white; border-radius: 15px; }
        .btn-payment-type {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #333;
            background: #252525;
            color: white;
            transition: 0.3s;
        }
        .btn-payment-type:hover { border-color: #ffc107; color: #ffc107; background: #2a2a2a; }

        hr { border-color: #444; opacity: 1; }
    </style>
</head>
<body class="p-4">

<div class="container" style="margin-right: 340px;">
    <h3 id="masaBaslik" class="text-warning mb-4">Masa Seçiniz</h3>
    <div class="row mb-5" id="masaAlani"></div>
    <hr>
    <h4 class="text-white mb-4">Menü</h4>
    <div id="menuAlani" class="row"></div>
</div>

<div class="siparis-alani">
    <h4 class="text-warning">Siparişler</h4>
    <div id="siparisListesi"></div>
    <hr>
    <h5>Toplam: <span id="toplamTutar" class="fiyat-text">0</span> <span class="text-warning">₺</span></h5>
    
    <button class="btn btn-odeme" onclick="odemeOnayiAc()">ÖDEME AL VE KAPAT</button>
    <button class="btn btn-rapor" onclick="gitRapor()">GÜN SONU RAPORU</button>
</div>

<div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-warning">Ödeme Türü Seçiniz</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center p-4">
        <p class="mb-4 fs-5">Masa <span id="modalMasaNo" class="text-warning"></span> toplam tutarı: <span id="modalTutar" class="text-success fw-bold"></span> ₺</p>
        <div class="d-grid gap-3">
          <button class="btn btn-payment-type" onclick="odemeYap('NAKİT')">💵 NAKİT</button>
          <button class="btn btn-payment-type" onclick="odemeYap('KART')">💳 KREDİ KARTI</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let aktifMasa = null;
    const paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'));

    const menu = [
          {ad:"DANA PİRZOLA", fiyat:1700},
  {ad:"KUZU ANTİRİKOT", fiyat:1500},
  {ad:"KABURGA", fiyat:1200},
  {ad:"KUZU PİRZOLA", fiyat:1400},
  {ad:"BONFİLE", fiyat:1200},
  {ad:"DİNLENDİRİLMİŞ DANA ANTİRİKOT", fiyat:1800},
  {ad:"DİNLENDİRİLMİŞ KUZU ANTİRİKOT", fiyat:1600},
  {ad:"DİNLENDİRİLMİŞ KUZU PİRZOLA", fiyat:1500},
  {ad:"DİNLENDİRİLMİŞ BONFİLE", fiyat:1300},
  {ad:"DİNLENDİRİLMİŞ KABURGA", fiyat:1300},
  {ad:"DİNLENDİRİLMİŞ DANA PİRZOLA", fiyat:1900},
  {ad:"ADANA", fiyat:700},
  {ad:"URFA", fiyat:700},
  {ad:"KÖRPE", fiyat:800},
  {ad:"KUZU ŞİŞ", fiyat:900},
  {ad:"DANA ŞİŞ", fiyat:1000},
  {ad:"KUZU KÜLBASTI", fiyat:1100},
  {ad:"DANA KÜLBASTI", fiyat:1200},
  {ad:"KUZU İNCİK", fiyat:1300},
  {ad:"DANA İNCİK", fiyat:1400},
  {ad:"KUZU GÜVEÇ", fiyat:1500},
  {ad:"DANA GÜVEÇ", fiyat:1600},
  {ad:"KUZU SOTE", fiyat:1700},
  {ad:"DANA SOTE", fiyat:1600},
  {ad:"KUZU KAVURMA", fiyat:1800},
  {ad:"DANA KAVURMA", fiyat:1900},
  {ad:"MEVSİM SALATA", fiyat:500},
  {ad:"ÇOBAN SALATA", fiyat:600},
  {ad:"SEBZE SALATA", fiyat:400},
  {ad:"YEŞİL SALATA", fiyat:450},
  {ad:"ATOM", fiyat:550},
  {ad:"HAVUÇ MEZESİ", fiyat:650},
  {ad:"FAVA", fiyat:700},
  {ad:"HUMUS", fiyat:750},
  {ad:"ACILI EZME", fiyat:800},
    ];

    
    const masaAlani = document.getElementById("masaAlani");
    for(let i=1; i<=12; i++){
        let col = document.createElement("div");
        col.className = "col-md-2 mb-3";
        col.innerHTML = `<div class="card p-3 text-center"><span class="masa-no">Masa ${i}</span></div>`;
        masaAlani.appendChild(col);
        col.querySelector(".card").addEventListener("click", () => {
            aktifMasa = i;
            document.getElementById("masaBaslik").innerText = "Masa " + i + " İşlemde";
            siparisleriGoster();
        });
    }


    const menuAlani = document.getElementById("menuAlani");
    menu.forEach(u => {
        menuAlani.innerHTML += `<div class="col-md-3 mb-4"><div class="card p-3 text-center"><div class="yemek-adi">${u.ad}</div><div class="fiyat-text mb-2">${u.fiyat} ₺</div><button class="btn btn-ekle btn-sm" onclick="urunEkle('${u.ad}', ${u.fiyat})">EKLE +</button></div></div>`;
    });

    function siparisleriGoster(){
        if(!aktifMasa) return;
        let siparisler = JSON.parse(localStorage.getItem("masa_" + aktifMasa + "_siparisler")) || [];
        let tutar = localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0;
        let liste = document.getElementById("siparisListesi");
        liste.innerHTML = "";
        siparisler.forEach(s => { 
            liste.innerHTML += `<div class="py-2 border-bottom border-secondary"><b>${s.ad}</b> <span class="float-end">${s.fiyat} ₺</span></div>`; 
        });
        document.getElementById("toplamTutar").innerText = tutar;
    }

    function urunEkle(ad, fiyat){
        if(!aktifMasa) { alert("Lütfen önce bir masa seçin!"); return; }
        let siparisler = JSON.parse(localStorage.getItem("masa_" + aktifMasa + "_siparisler")) || [];
        siparisler.push({ad, fiyat});
        localStorage.setItem("masa_" + aktifMasa + "_siparisler", JSON.stringify(siparisler));
        let tutar = parseFloat(localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0) + fiyat;
        localStorage.setItem("masa_" + aktifMasa + "_tutar", tutar);
        siparisleriGoster();
    }

    
    function odemeOnayiAc() {
        if(!aktifMasa) { alert("Masa seçili değil!"); return; }
        let tutar = parseFloat(localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0);
        if(tutar === 0) { alert("Masa boş!"); return; }

        document.getElementById("modalMasaNo").innerText = aktifMasa;
        document.getElementById("modalTutar").innerText = tutar;
        paymentModal.show();
    }

    
    function odemeYap(tur){
        let tutar = parseFloat(localStorage.getItem("masa_" + aktifMasa + "_tutar") || 0);
        
        
        let rapor = JSON.parse(localStorage.getItem("gun_sonu_raporu")) || [];
        let simdi = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        rapor.push({ saat: simdi, masa: aktifMasa, tutar: tutar, tur: tur });
        localStorage.setItem("gun_sonu_raporu", JSON.stringify(rapor));

    
        localStorage.removeItem("masa_" + aktifMasa + "_tutar");
        localStorage.removeItem("masa_" + aktifMasa + "_siparisler");
        
        paymentModal.hide();
        alert(tur + " ödemesi alındı. Masa kapatıldı.");
        location.reload();
    }

    function gitRapor() {
        window.location.href = "günsonu.html";
    }
</script>
</body>
</html>
