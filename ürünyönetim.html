<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Urban POS - Ürün Yönetimi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
    color:white;
    font-family:Segoe UI;
}


.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:bold;
    color:#ffc107;
}

.nav-btns button{
    border-radius:12px;
    padding:10px 18px;
    font-weight:600;
}


.card{
    background:#1f1f1f;
    border:1px solid #333;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}


table{
    color:white;
}

.table thead{
    color:#ffc107;
}

input,select{
    background:#111 !important;
    color:white !important;
    border:1px solid #333 !important;
}

input:focus{
    box-shadow:none !important;
    border-color:#ffc107 !important;
}

.btn-action{
    border-radius:10px;
}

.stock-switch{
    transform:scale(1.2);
}
</style>
</head>

<body class="p-4">
<script>
if(sessionStorage.getItem("oturum") !== "true"){
    window.location.href = "GİRİŞ YAP.html";
}
</script>
<div class="container">

    
    <div class="header">
        <div class="title">🍽 Urban POS - Ürün Yönetimi</div>

        <div class="nav-btns d-flex gap-2">
            <button class="btn btn-primary" onclick="gitMenu()">📋 Menü</button>
            <button class="btn btn-success" onclick="gitSiparis()">🧾 Sipariş</button>
        </div>
    </div>

    <!-- ÜRÜN EKLE -->
    <div class="card p-3 mb-4">
        <div class="row g-2">
            <div class="col-md-4">
                <input id="ad" class="form-control" placeholder="Ürün adı">
            </div>
            <div class="col-md-3">
                <input id="fiyat" type="number" class="form-control" placeholder="Fiyat">
            </div>
            <div class="col-md-3">
                <select id="kat" class="form-select">
                    <option value="kirmizi">Kırmızı Et</option>
                    <option value="beyaz">Beyaz Et</option>
                    <option value="meze">Meze</option>
                    <option value="icecek">İçecek</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-warning w-100" onclick="ekle()">Ekle</button>
            </div>
        </div>
    </div>

    <!-- TABLO -->
    <div class="card p-3">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Ürün</th>
                    <th>Fiyat</th>
                    <th>Kategori</th>
                    <th>Stok</th>
                    <th>İşlem</th>
                </tr>
            </thead>
            <tbody id="liste"></tbody>
        </table>
    </div>

</div>

<script>

function getProducts(){
    return JSON.parse(localStorage.getItem("urban_products")) || [];
}

function saveProducts(data){
    localStorage.setItem("urban_products", JSON.stringify(data));
}

/* SAYFA YÜKLE */
function render(){
    let data = getProducts();
    let html = "";

    data.forEach(p=>{
        html += `
        <tr>
            <td class="fw-bold">${p.name}</td>
            <td>${p.price} ₺</td>
            <td><span class="text-warning">${p.category}</span></td>
            <td>
                <input type="checkbox" class="form-check-input stock-switch"
                ${p.inStock ? "checked":""}
                onchange="stok('${p.id}')">
            </td>
            <td>
                <button class="btn btn-danger btn-sm btn-action" onclick="sil('${p.id}')">Sil</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("liste").innerHTML = html;
}

/* EKLE */
function ekle(){
    let data = getProducts();

    data.push({
        id: Date.now().toString(),
        name: document.getElementById("ad").value,
        price: Number(document.getElementById("fiyat").value),
        category: document.getElementById("kat").value,
        inStock: true
    });

    saveProducts(data);
    render();
}

/* SİL */
function sil(id){
    let data = getProducts().filter(x=>x.id !== id);
    saveProducts(data);
    render();
}

/* STOK */
function stok(id){
    let data = getProducts();
    let u = data.find(x=>x.id === id);
    u.inStock = !u.inStock;
    saveProducts(data);
    render();
}

/* NAVİGASYON */
function gitMenu(){
    window.location.href = "MENÜ.html";
}

function gitSiparis(){
    window.location.href = "siparis.html";
}

render();

    </script>

  </body>

</html>
