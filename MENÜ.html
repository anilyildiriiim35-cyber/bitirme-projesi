<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Urban Menü</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f0f0f;
    color:white;
}

.card{
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:12px;
}

.btn-filter{
    margin-right:8px;
    margin-bottom:10px;
}

.search-box{
    background:#1b1b1b;
    border:1px solid #333;
    color:white;
    border-radius:10px;
    padding:10px;
}
</style>
</head>

<body class="p-4">

<script>
if(sessionStorage.getItem("oturum") !== "true"){
    window.location.href = "GİRİŞ YAP.html";
}
</script>

<div class="container">

<h2 class="text-warning mb-3">MENÜ</h2>


<input 
id="search" 
class="form-control search-box mb-3" 
placeholder="Ürün ara..." 
onkeyup="searchMenu()">


<div class="mb-3">
    <button class="btn btn-warning btn-filter" onclick="filter('hepsi')">Hepsi</button>
    <button class="btn btn-danger btn-filter" onclick="filter('kirmizi')">Kırmızı Et</button>
    <button class="btn btn-primary btn-filter" onclick="filter('beyaz')">Beyaz Et</button>
    <button class="btn btn-success btn-filter" onclick="filter('meze')">Meze</button>
    <button class="btn btn-info btn-filter" onclick="filter('icecek')">İçecek</button>
</div>

<div class="row" id="menu"></div>

</div>

<script>

let allProducts = [];

function getProducts(){
    return JSON.parse(localStorage.getItem("urban_products")) || [];
}

function render(list){
    let html = "";

    list.forEach(u=>{
        if(!u.inStock) return;

        html += `
        <div class="col-md-3 mb-3">
            <div class="card p-3 text-center">
                <h5>${u.name}</h5>
                <b class="text-warning">${u.price} ₺</b>
                <small class="text-secondary">${u.category}</small>
            </div>
        </div>`;
    });

    document.getElementById("menu").innerHTML = html;
}


function filter(type){
    let data = allProducts;

    if(type !== "hepsi"){
        data = data.filter(x => x.category === type);
    }

    render(data);
}


function searchMenu(){
    let q = document.getElementById("search").value.toLowerCase();

    let filtered = allProducts.filter(x =>
        x.inStock &&
        x.name.toLowerCase().includes(q)
    );

    render(filtered);
}


allProducts = getProducts();
render(allProducts);

</script>

</body>
</html>
