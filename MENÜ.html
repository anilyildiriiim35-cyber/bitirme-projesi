<style>
    body { background:#0f0f0f; color:white; font-family: 'Segoe UI', sans-serif; }

    /* KARTLAR */
    .card {
        background:#1b1b1b; border: none; border-radius:15px; transition:.3s; overflow:hidden;
    }
    .card:hover { transform:translateY(-5px); box-shadow:0 10px 20px rgba(255, 193, 7, 0.2); }

    /* FOTOĞRAF BOYUTLARI BÜYÜTÜLDÜ */
    .card img { width:100%; height:250px; object-fit:cover; }

    .card-body { padding:20px; }

    /* KATEGORİ ÖZEL */
    .kategori-kart { cursor:pointer; border: 1px solid #333; }
    .kategori-kart:hover { border-color: #ffc107; }

    /* GERİ DÖN BUTONU */
    .btn-geri { 
        background: transparent; 
        border: 1px solid #ffc107; 
        color: #ffc107; 
        margin-bottom: 20px; 
        border-radius: 20px;
        padding: 8px 25px;
    }
    .btn-geri:hover { background: #ffc107; color: black; }

    .fiyat-etiket { color: #ffc107; font-weight: bold; font-size: 1.4rem; margin-top: 10px; }
    h5 { min-height: 50px; display: flex; align-items: center; justify-content: center; }
</style>
</head>

function kategoriSec(kategori){
    document.getElementById("kategoriAlani").classList.add("d-none");
    document.getElementById("btnGeri").classList.remove("d-none");

    menuAlani.innerHTML = "";

    filtreli.forEach(u => {
        menuAlani.innerHTML += `
            <div class="col-md-4 col-lg-3 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <h5 class="fw-bold text-uppercase">${u.ad}</h5>
                        <div class="fiyat-etiket">${u.fiyat} ₺</div>
                    </div>
                </div>
            </div>
        `;
    });
}

function kategorilereDon() {
    document.getElementById("kategoriAlani").classList.remove("d-none");
