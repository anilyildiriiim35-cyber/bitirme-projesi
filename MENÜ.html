<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Menü</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#121212; color:white; }

.card {
  background:#1e1e1e; border-radius:12px; transition:.2s; overflow:hidden;
}
.card:hover { transform:scale(1.05); box-shadow:0 0 10px #ffc107; }

.card img { width:100%; height:150px; object-fit:cover; border-radius:12px 12px 0 0; }

.card-body { padding:10px; }

.btn-ekle { background:#ffc107; color:black; font-weight:bold; width:100%; }

.siparis-alani {
  position:fixed; right:0; top:0; width:300px; height:100%;
  background:#1a1a1a; border-left:3px solid #ffc107;
  padding:15px; overflow-y:auto;
}
</style>
</head>

<body class="p-4">

<div class="container">
  <h3 id="menuBaslik" class="text-warning mb-4">Menü</h3>
  <div class="row" id="menuAlani"></div>
</div>

<div class="siparis-alani">
  <h5>Siparişler</h5>
  <div id="siparisListesi"></div>
  <hr>
  <h5>Toplam: <span id="toplamTutar">0</span> ₺</h5>
  <button class="btn btn-danger mt-3" onclick="hesapAl()">Hesap Al</button>
</div>

<script>

let menu = [
   {ad:"DANA PİRZOLA", fiyat:1700},
  {ad:"KUZU ANTİRİKOT", fiyat:1500},
  {ad:"KABURGA", fiyat:1200},
  {ad:"KUZU PİRZOLA", fiyat:1400},
  {ad:"BONFİLE", fiyat:1200},
  {ad:"DİNLENDİRİLMİŞ DANA ANTİRİKOT", fiyat:1800},
  {ad:"DİNLENDİRİLMİŞ KUZU ANTİRİKOT", fiyat:1600},
  {ad:"DİNLENDİRİLMİŞ KUZU PİRZOLA", fiyat:1500},
  {ad:"DİNLENDİRİLMİŞ BONFİLE", fiyat:1300},
  {ad:"DİNLENDİRİLMİŞ KABURGA", fiyat:1300},
  {ad:"DİNLENDİRİLMİŞ DANA PİRZOLA", fiyat:1900},
  {ad:"ADANA", fiyat:700},
  {ad:"URFA", fiyat:700},
  {ad:"KÖRPE", fiyat:800},
  {ad:"KUZU ŞİŞ", fiyat:900},
  {ad:"DANA ŞİŞ", fiyat:1000},
  {ad:"KUZU KÜLBASTI", fiyat:1100},
  {ad:"DANA KÜLBASTI", fiyat:1200},
  {ad:"KUZU İNCİK", fiyat:1300},
  {ad:"DANA İNCİK", fiyat:1400},
  {ad:"KUZU GÜVEÇ", fiyat:1500},
  {ad:"DANA GÜVEÇ", fiyat:1600},
  {ad:"KUZU SOTE", fiyat:1700},
  {ad:"DANA SOTE", fiyat:1600},
  {ad:"KUZU KAVURMA", fiyat:1800},
  {ad:"DANA KAVURMA", fiyat:1900},
  {ad:"MEVSİM SALATA", fiyat:500},
  {ad:"ÇOBAN SALATA", fiyat:600},
  {ad:"SEBZE SALATA", fiyat:400},
  {ad:"YEŞİL SALATA", fiyat:450},
  {ad:"ATOM", fiyat:550},
  {ad:"HAVUÇ MEZESİ", fiyat:650},
  {ad:"FAVA", fiyat:700},
  {ad:"HUMUS", fiyat:750},
  {ad:"ACILI EZME", fiyat:800},
    
  ];


let menuAlani = document.getElementById("menuAlani");


let siparisler = [];
let toplamTutar = 0;


menu.forEach(u=>{
  menuAlani.innerHTML += `
    <div class="col-md-3 mb-3">
      <div class="card">
        <img src="${u.img}" alt="${u.ad}">
        <div class="card-body text-center">
          <h5>${u.ad}</h5>
          <p>${u.fiyat} ₺</p>
          <button class="btn btn-ekle btn-sm" onclick="urunEkle('${u.ad}',${u.fiyat})">Siparişe Ekle</button>
        </div>
      </div>
    </div>
  `;
});


function siparisleriGoster(){
  let liste = document.getElementById("siparisListesi");
  liste.innerHTML = "";

  if(siparisler.length === 0){
    liste.innerHTML = "<p>Sipariş yok</p>";
  } else {
    siparisler.forEach(s=>{
      liste.innerHTML += `<div>${s.ad} - ${s.fiyat} ₺</div>`;
    });
  }

  document.getElementById("toplamTutar").innerText = toplamTutar;
}


function urunEkle(ad,fiyat){
  siparisler.push({ad:ad,fiyat:fiyat});
  toplamTutar += fiyat;
  siparisleriGoster();
}


function hesapAl(){
  if(toplamTutar === 0){
    alert("Ödenecek sipariş yok!");
    return;
  }

  alert("Ödeme alındı: "+toplamTutar+" ₺");
  siparisler = [];
  toplamTutar = 0;
  siparisleriGoster();
}
</script>

</body>
</html>
