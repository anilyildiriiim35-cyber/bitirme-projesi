<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Urban POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .card-box {
            background: #1b1b1b;
            border-radius: 15px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 0 25px rgba(255, 193, 7, 0.2);
        }

        .logo {
            text-align: center;
            color: #ffc107;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .form-control, .form-select {
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
        }

        .form-control:focus, .form-select:focus {
            background: #2a2a2a;
            color: white;
            border-color: #ffc107;
            box-shadow: 0 0 5px #ffc107;
        }

        .btn-urban {
            background: #ffc107;
            border: none;
            color: black;
            font-weight: bold;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-urban:hover {
            background: #e0a800;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        .success-text {
            color: #28a745;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .badge-authority {
            display: block;
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            margin-bottom: 15px;
            background-color: #ffc107;
            color: black;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loginBox" class="card-box">
        <div class="logo">Urban POS</div>
        <div class="mb-3">
            <label class="form-label">Giriş Türü</label>
            <select id="rol" class="form-select">
                <option value="">Seçiniz</option>
                <option value="mudur">Müdür</option>
                <option value="personel">Personel</option>
                <option value="calisan">Çalışan</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Kullanıcı Adı</label>
            <input id="username" type="text" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Şifre</label>
            <input id="password" type="password" class="form-control">
        </div>
        <button class="btn btn-urban" onclick="girisYap()">Giriş Yap</button>
    </div>

    <div id="mainBox" class="card-box hidden text-center">
        <div class="logo">Urban Panel</div>
        <h3 id="hosgeldin"></h3>
        
        <div id="rolBilgi" class="badge-authority">YETKİ: -</div>
        
        <hr class="border-secondary">
            <p class="success-text">Başarıyla giriş yaptınız!</p>

        <button class="btn btn-urban mt-3" onclick="cikisYap()">Güvenli Çıkış</button>
    </div>

    <script>
        const kullanicilar = {
            mudur: [{ username: "admin", password: "admin123" }],
            personel: [
                { username: "ali", password: "1234" },
                { username: "ayse", password: "1234" }
            ],
            calisan: [{ username: "mehmet", password: "0000" }]
        };

        function girisYap() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let rol = document.getElementById("rol").value;

            if (rol === "") {
                alert("Lütfen bir rol seçiniz!");
                return;
            }

            let liste = kullanicilar[rol];
            let kullanici = liste.find(k => k.username === username && k.password === password);

            if (kullanici) {
                
                sessionStorage.setItem("oturumAcik", "true");
                sessionStorage.setItem("aktifKullanici", username);
                sessionStorage.setItem("aktifRol", rol);

                
                paneliGoster(username, rol);
            } else {
                alert("Hatalı kullanıcı adı veya şifre!");
            }
        }

        function paneliGoster(username, rol) {
            
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainBox").classList.remove("hidden");

            
            document.getElementById("hosgeldin").innerText = "Hoş geldin, " + username;
            
            
            let yetkiText = "";
            if(rol === "mudur") yetkiText = "MÜDÜR";
            else if(rol === "personel") yetkiText = "PERSONEL";
            else yetkiText = "ÇALIŞAN";

            document.getElementById("rolBilgi").innerText = "YETKİ: " + yetkiText;
        }

        function cikisYap() {
            sessionStorage.clear(); 
            
            document.getElementById("mainBox").classList.add("hidden");
            document.getElementById("loginBox").classList.remove("hidden");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("rol").value = "";
        }

        
        window.onload = function() {
            if (sessionStorage.getItem("oturumAcik") === "true") {
                let u = sessionStorage.getItem("aktifKullanici");
                let r = sessionStorage.getItem("aktifRol");
                paneliGoster(u, r);
            }
        };
    </script>

</body>
</html>
