<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Urban POS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f0f0f;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
color:white;
}

.card-box{
background:#1b1b1b;
border-radius:15px;
padding:40px;
width:380px;
box-shadow:0 0 25px rgba(255,193,7,0.2);
}

.logo{
text-align:center;
color:#ffc107;
font-size:28px;
font-weight:bold;
margin-bottom:25px;
}

.form-control, .form-select{
background:#2a2a2a;
border:none;
color:white;
}

.form-control:focus, .form-select:focus{
background:#2a2a2a;
color:white;
box-shadow:0 0 5px #ffc107;
}

.btn-login{
background:#ffc107;
border:none;
color:black;
font-weight:bold;
width:100%;
padding:10px;
}

.btn-login:hover{
background:#e0a800;
}

.hidden{
display:none;
}

</style>

</head>

<body>


<div id="loginBox" class="card-box">

<div class="logo">Urban POS</div>

<div class="mb-3">
<label>Giriş Türü</label>
<select id="rol" class="form-select">
<option value="">Seçiniz</option>
<option value="mudur">Müdür</option>
<option value="personel">Personel</option>
<option value="calisan">Çalışan</option>
</select>
</div>

<div class="mb-3">
<label>Kullanıcı Adı</label>
<input id="username" type="text" class="form-control">
</div>

<div class="mb-3">
<label>Şifre</label>
<input id="password" type="password" class="form-control">
</div>

<button class="btn btn-login" onclick="girisYap()">Giriş Yap</button>

</div>


<div id="mainBox" class="card-box hidden text-center">

<h3 id="hosgeldin"></h3>
<p id="rolBilgi"></p>

<hr>

<button class="btn btn-danger w-100" onclick="cikisYap()">Çıkış Yap</button>

</div>

<script>

// Kullanıcılar
let kullanicilar = {
    mudur: [
        { username: "admin", password: "admin123" }
    ],
    personel: [
        { username: "ali", password: "1234" },
        { username: "ayse", password: "1234" }
    ],
    calisan: [
        { username: "mehmet", password: "0000" }
    ]
}

function girisYap(){

let username = document.getElementById("username").value
let password = document.getElementById("password").value
let rol = document.getElementById("rol").value

if(rol === ""){
    alert("Rol seç!")
    return
}

let liste = kullanicilar[rol]

let kullanici = liste.find(k => k.username === username && k.password === password)

if(kullanici){

    
    document.getElementById("loginBox").classList.add("hidden")
    document.getElementById("mainBox").classList.remove("hidden")

    document.getElementById("hosgeldin").innerText = "Hoşgeldin " + username
    document.getElementById("rolBilgi").innerText = "Rol: " + rol

}else{
    alert("Hatalı giriş!")
}

}

function cikisYap(){
    location.reload()
}

</script>

</body>
</html>
