<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Urban POS - Yönetim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f0f0f;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .card-box {
            background: #1b1b1b;
            border-radius: 15px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 0 25px rgba(255, 193, 7, 0.2);
        }

        .logo {
            text-align: center;
            color: #ffc107;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .form-control, .form-select {
            background: #2a2a2a;
            border: 1px solid #333;
            color: white;
        }

        .form-control:focus, .form-select:focus {
            background: #2a2a2a;
            color: white;
            border-color: #ffc107;
            box-shadow: 0 0 5px #ffc107;
        }

        .btn-urban {
            background: #ffc107;
            border: none;
            color: black;
            font-weight: bold;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            border-radius: 8px;
        }

        .btn-urban:hover {
            background: #e0a800;
            transform: translateY(-2px);
            color: black;
        }

        .hidden {
            display: none !important;
        }

        .badge-authority {
            display: block;
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            background-color: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            border: 1px solid #ffc107;
            border-radius: 8px;
            font-weight: bold;
        }

        .status-text {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="loginBox" class="card-box">
        <div class="logo">Urban POS</div>
        <div class="mb-3">
            <label class="form-label">Giriş Türü</label>
            <select id="rol" class="form-select">
                <option value="">Seçiniz</option>
                <option value="mudur">Müdür</option>
                <option value="personel">Personel</option>
                <option value="calisan">Çalışan</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Kullanıcı Adı</label>
            <input id="username" type="text" class="form-control" placeholder="Kullanıcı adı">
        </div>
        <div class="mb-3">
            <label class="form-label">Şifre</label>
            <input id="password" type="password" class="form-control" placeholder="****">
        </div>
        <button class="btn btn-urban" onclick="girisYap()">Sisteme Giriş Yap</button>
    </div>

    <div id="mainBox" class="card-box hidden text-center">
        <div class="logo">Urban Panel</div>
        
        <button id="rolButonArayuz" class="btn btn-urban mb-3" style="cursor: default;">
            Giriş Türü: Belirlenmedi
        </button>

        <div id="kullaniciSelam" class="status-text">Oturum açıldı.</div>
        
        <hr class="border-secondary">

        <button id="btnGunSonu" class="btn btn-danger w-100 mb-2 hidden" style="font-weight: bold;">
            Gün Sonu Raporu Al
        </button>

        <a href="ANASAYFA.html" class="btn btn-outline-warning w-100 mb-2">
            Satış Ekranına Geç
        </a>

        <button class="btn btn-link text-secondary text-decoration-none mt-3" onclick="cikisYap()">
            Güvenli Çıkış Yap
        </button>
    </div>

    <script>
        
        const veritabani = {
            mudur: [{ username: "admin", password: "123" }],
            personel: [{ username: "ali", password: "123" }],
            calisan: [{ username: "can", password: "123" }]
        };

        function girisYap() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            const r = document.getElementById("rol").value;

            if (!r) { alert("Lütfen rol seçin!"); return; }

            const kullanici = veritabani[r].find(k => k.username === u && k.password === p);

            if (kullanici) {
                
                sessionStorage.setItem("oturum", "true");
                sessionStorage.setItem("aktifRol", r);
                sessionStorage.setItem("aktifAd", u);

                arayuzuGuncelle(u, r);
            } else {
                alert("Bilgiler hatalı!");
            }
        }

        function arayuzuGuncelle(ad, rol) {
            
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainBox").classList.remove("hidden");

            
            document.getElementById("kullaniciSelam").innerText = "Hoş geldin, " + ad.toUpperCase();

            
            const rolButon = document.getElementById("rolButonArayuz");
            if(rol === "mudur") {
                rolButon.innerText = "MÜDÜR GİRİŞİ YAPILDI";
                rolButon.style.background = "#ffc107";
                
                document.getElementById("btnGunSonu").classList.remove("hidden");
            } else if(rol === "personel") {
                rolButon.innerText = "PERSONEL GİRİŞİ YAPILDI";
                rolButon.style.background = "#0dcaf0"; 
                document.getElementById("btnGunSonu").classList.add("hidden");
            } else {
                rolButon.innerText = "ÇALIŞAN GİRİŞİ YAPILDI";
                rolButon.style.background = "#f8f9fa"; 
                document.getElementById("btnGunSonu").classList.add("hidden");
            }
        }

        function cikisYap() {
            sessionStorage.clear();
            location.reload(); 
        }

        window.onload = function() {
            if (sessionStorage.getItem("oturum") === "true") {
                arayuzuGuncelle(sessionStorage.getItem("aktifAd"), sessionStorage.getItem("aktifRol"));
            }
        };
    </script>
</body>
</html>
